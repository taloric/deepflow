on: 
  push:
    branches:
      - package-rust-env
    paths:
      - 'agent/docker/DockerfileToFix.build'
      - 'agent/docker/DockerfileToFix-aarch64.build'

name: build agent env

jobs:
  build_agent_env_update:
    name: build agent env update
    runs-on: "ubuntu-22.04"
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: docker version
        run: |
          docker version
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          install: true
      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@v2
        with:
          registry: "ghcr.io" 
          username: "${{ github.repository_owner }}"
          password: "${{ secrets.GHCR_PUSH_TOKEN }}" 
      - name: Log in to ALIYUN Docker Registry
        uses: docker/login-action@v2
        with:
          registry: "${{ secrets.REGISTRY_ALIYUN_ADDR }}"
          username: "${{ secrets.REGISTRY_ALIYUN_USER }}" 
          password: "${{ secrets.REGISTRY_PASS }}"
      - name: Build and push deepflow agent env images
        uses: docker/build-push-action@v2
        with:
          context: agent
          push: true 
          file: agent/docker/dockerfile-build-env
          platforms: linux/amd64
          tags: |
            "ghcr.io/${{ github.repository_owner }}/rust-build:1.21"
            "${{ secrets.REGISTRY_ALIYUN_ADDR }}/taloricag/rust-build:1.21"

  build_agent_env:
    name: build agent env
    #runs-on: "cirun-aws-amd64-32c--${{ github.run_id }}"
    runs-on: "ubuntu-22.04"
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # - name: install docker
      #   run: |
      #     curl -fsSL https://get.docker.com | bash

      - name: docker version
        run: |
          docker version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          install: true

      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@v2
        with:
          registry: "ghcr.io" 
          username: "${{ github.repository_owner }}"
          password: "${{ secrets.GHCR_PUSH_TOKEN }}" 

      - name: Log in to ALIYUN Docker Registry
        uses: docker/login-action@v2
        with:
          registry: "${{ secrets.REGISTRY_ALIYUN_ADDR }}"
          username: "${{ secrets.REGISTRY_ALIYUN_USER }}" 
          password: "${{ secrets.REGISTRY_PASS }}"

      - name: Build and push deepflow agent env images
        uses: docker/build-push-action@v2
        with:
          context: agent
          push: true 
          file: agent/docker/DockerfileToFix.build
          platforms: linux/amd64
          tags: |
            "ghcr.io/${{ github.repository_owner }}/rust-build:1.22"
            "${{ secrets.REGISTRY_ALIYUN_ADDR }}/taloricag/rust-build:1.22"

  build_agent_env_arm64:
    name: build agent env arm64
    #runs-on: "cirun-aws-arm64-32c--${{ github.run_id }}"
    runs-on: "macos-14"
    steps:

      - name: Checkout
        uses: actions/checkout@v3
      # - name: install docker
      #   run: |
      #     curl -fsSL https://get.docker.com | bash

      - name: docker version
        run: |
          docker version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          install: true

      - name: Log in to GitHub Docker Registry
        uses: docker/login-action@v2
        with:
          registry: "ghcr.io" 
          username: "${{ github.repository_owner }}"
          password: "${{ secrets.GHCR_PUSH_TOKEN }}" 

      #- name: Log in to ALIYUN Docker Registry
      #  uses: docker/login-action@v2
      #  with:
      #    registry: "${{ secrets.REGISTRY_ALIYUN_ADDR }}"
      #    username: "${{ secrets.REGISTRY_ALIYUN_USER }}" 
      #    password: "${{ secrets.REGISTRY_PASS }}"

      - name: Build and push deepflow agent env image
        uses: docker/build-push-action@v2
        with:
          context: agent
          push: true 
          file: agent/docker/DockerfileToFix-aarch64.build
          platforms: linux/arm64
          tags: |
            "ghcr.io/${{ github.repository_owner }}/rust-build:1.20-arm64"
            "ghcr.io/${{ github.repository_owner }}/rust-build:latest-arm64"
